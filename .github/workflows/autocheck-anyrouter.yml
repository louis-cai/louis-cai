name: AnyRouter 自动签到
on:
  schedule:
    - cron: '0 */6 * * *'  # 每隔 6 小时执行一次，或其他您需要的时间
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: 执行签到
        uses: rakuyoMo/autocheck-anyrouter@v1.4.1
        with:
          # 从环境变量加载账号信息
          accounts: ${{ secrets.ANYROUTER_ACCOUNTS }}
          # 可选：是否显示敏感信息，默认为 `false`
          show-sensitive-info: false
          # 可选：配置通知方式
          # ... 其他通知配置
